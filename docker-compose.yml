
services:

  cloudflared:
    # More info at https://developers.cloudflare.com/1.1.1.1/dns-over-https/
    container_name: dns-cloudflared
    #image: cloudflare/cloudflared:latest
    build: ./build/cloudflared
    hostname: cloudflared-${HOSTNAME}
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    networks:
      dns:
        ipv4_address: ${DOCKER_CLOUDFLARED_IP}

  #adguard:
  #  container_name: adguard
  #  build: ./build/adguard
  #  networks:
  #    dns:
  #      ipv4_address: 192.168.2.8
  #  ports:
  #    - "80:80"
  #    - "443:443"
  #    - "3000:3000"
  #    - "53:53/tcp"
  #    - "53:53/udp"
  #  volumes:
  #    - /etc/localtime:/etc/localtime:ro
  #    - /etc/timezone:/etc/timezone:ro
  #    - /etc/hosts:/etc/hosts:ro
  #    - ./config/adguard/work:/opt/adguardhome/work
  #    - ./config/adguard/conf:/opt/adguardhome/conf
  #  restart: unless-stopped

  pihole:
    # More info at https://github.com/pi-hole/docker-pi-hole/ and https://docs.pi-hole.net/
    container_name: dns-pihole
    image: pihole/pihole:latest
    hostname: pihole-${HOSTNAME}
    networks:
      dns:
        ipv4_address: ${DOCKER_PIHOLE_IP}
    ports:
      - "80:80"
      - "443:443"
      - "53:53/tcp"
      - "53:53/udp"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - PIHOLE_DNS_=192.168.2.201;192.168.2.202;192.168.2.203
      - SKIPGRAVITYONBOOT=1
      - IPv6=false
      #- PROXY_LOCATION=${SERVER_IP}
      #- VIRTUAL_HOST=pihole.${DOMAINNAME}
      #- VIRTUAL_PORT=80
    # Volumes store your data between container upgrades
    volumes:
      - /etc/hosts:/etc/hosts:ro
      - ./config/pihole/etc/pihole:/etc/pihole/
      - ./config/pihole/etc/dnsmasq.d:/etc/dnsmasq.d/
    dns:
      - 127.0.0.1
      - 192.168.2.201
      - 192.168.2.202
      - 192.168.2.203
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.docker.network=web"

    #   - "traefik.http.middlewares.pihole-redirect.redirectregex.regex=^https://([^/]+)/(|admin)$$"
    #   - "traefik.http.middlewares.pihole-redirect.redirectregex.replacement=https://$${1}/admin/"
    #   - "traefik.http.middlewares.pihole-redirect.redirectregex.permanent=true"

    #   - "traefik.http.routers.pihole.entrypoints=websecure"
    #   - "traefik.http.routers.pihole.rule=Host(`pihole.${DOMAINNAME}`)"
    #   - "traefik.http.routers.pihole.tls.certResolver=tls"
    #   - "traefik.http.routers.pihole.middlewares=pihole-redirect@docker"
    #   - "traefik.http.routers.pihole.service=pihole@docker"
    #   - "traefik.http.services.pihole.loadbalancer.server.port=80"

    # Recommended but not required (DHCP needs NET_ADMIN)
    #   https://github.com/pi-hole/docker-pi-hole#note-on-capabilities
    #cap_add:
    #  - NET_ADMIN
    restart: unless-stopped

  nebula-sync:
    image: ghcr.io/lovelaze/nebula-sync:latest
    container_name: dns-nebula-sync    
    restart: unless-stopped
    networks:
      dns:
        ipv4_address: ${DOCKER_NEBULASYNC_IP}
    environment:
    - PRIMARY=${DOCKER_NEBULASYNC_HOST1}|${DOCKER_NEBULASYNC_PASS1}
    - REPLICAS=${DOCKER_NEBULASYNC_HOST2}|${DOCKER_NEBULASYNC_PASS2},${DOCKER_NEBULASYNC_HOST3}|${DOCKER_NEBULASYNC_PASS3}
    - FULL_SYNC=false
    - SYNC_CONFIG_DNS=false		#Synchronize DNS settings
    - SYNC_CONFIG_DHCP=false		#Synchronize DHCP settings
    - SYNC_CONFIG_NTP=false		#Synchronize NTP settings
    - SYNC_CONFIG_RESOLVER=false		#Synchronize resolver settings
    - SYNC_CONFIG_DATABASE=true		#Synchronize database settings
    - SYNC_CONFIG_MISC=true		#Synchronize miscellaneous settings
    - SYNC_CONFIG_DEBUG=true		#Synchronize debug settings
    - SYNC_GRAVITY_DHCP_LEASES=false		#Synchronize DHCP leases
    - SYNC_GRAVITY_GROUP=true		#Synchronize groups
    - SYNC_GRAVITY_AD_LIST=true		#Synchronize ad lists
    - SYNC_GRAVITY_AD_LIST_BY_GROUP=true		#Synchronize ad lists by group
    - SYNC_GRAVITY_DOMAIN_LIST=true		#Synchronize domain lists
    - SYNC_GRAVITY_DOMAIN_LIST_BY_GROUP=true		#Synchronize domain lists by group
    - SYNC_GRAVITY_CLIENT=true		#Synchronize clients
    - SYNC_GRAVITY_CLIENT_BY_GROUP=true		#Synchronize clients by group
    - RUN_GRAVITY=true 
    - CRON=0 4 * * *
    - TZ=${TZ}





networks:
  dns:
    external: true
